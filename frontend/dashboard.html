<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THBMS — User Management</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .actions-cell { display: flex; gap: .4rem; }
    .no-data { text-align: center; color: var(--gray-mid); padding: 2.5rem; font-size: .9rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    .modal-footer { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.2rem; }
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--green-dark); color: #fff;
      padding: .75rem 1.2rem; border-radius: var(--radius);
      font-size: .88rem; box-shadow: var(--shadow);
      transform: translateY(20px); opacity: 0;
      transition: all .3s; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); }
  </style>
</head>
<body>

  <!-- Topbar -->
  <nav class="topbar">
    <div class="topbar-brand">Tranquility<span>Haven</span> &nbsp;·&nbsp; Admin</div>
    <div class="topbar-user">
      <span>Welcome, <strong id="topbarName">—</strong></span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()" style="color:#fff;border-color:rgba(255,255,255,.4)">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="section-header">
      <div>
        <h1>User Management</h1>
        <p class="section-desc">Add, edit, activate or deactivate system accounts.</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Account</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, email, or username…" oninput="loadUsers()" />
      <button class="btn btn-outline" onclick="loadUsers()">Search</button>
    </div>

    <!-- Alert -->
    <div class="alert alert-error" id="pageAlert"></div>

    <!-- Table -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Full Name</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTable">
            <tr><td colspan="7" class="no-data">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── ADD / EDIT MODAL ── -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Account</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="alert alert-error" id="modalAlert"></div>

      <input type="hidden" id="editId" />

      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="mFullName" placeholder="Juan dela Cruz" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="mUsername" placeholder="juandc" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="mEmail" placeholder="juan@thbms.com" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="mRole">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label id="passLabel">Password</label>
          <input type="password" id="mPassword" placeholder="Min. 6 characters" />
        </div>
      </div>
      <p id="passHint" style="font-size:.78rem;color:var(--gray-mid);margin-top:-.5rem;margin-bottom:.8rem;display:none;">
        Leave blank to keep current password.
      </p>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveUser()">
          <span class="spinner" id="saveSpin"></span>
          <span id="saveBtnText">Save Account</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="js/users.js"></script>
</body>
</html>
