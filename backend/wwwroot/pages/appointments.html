<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>THBMS — Appointments</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/transactions.css"/>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-brand">Tranquility<span>Haven</span></div>
    <div class="topbar-nav">
      <a href="../index.html">Dashboard</a>
      <a href="appointments.html" class="active">Appointments</a>
      <a href="assignments.html">Assignments</a>
      <a href="payments.html">Payments</a>
      <a href="reports.html">Reports</a>
    </div>
    <div class="topbar-user"><span>Welcome, <strong id="topbarName">—</strong></span>
      <button class="btn btn-outline btn-sm logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </nav>
  <div class="page-wrap">
    <div class="section-header">
      <div><h1>Book Appointment</h1><p class="section-desc">Transaction 1 — Manage client appointment bookings.</p></div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Book Appointment</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search client, service…" oninput="loadData()"/>
      <select id="statusFilter" onchange="loadData()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Client</th><th>Service</th><th>Price</th>
            <th>Date</th><th>Time</th><th>Therapist</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody id="dataTable"><tr><td colspan="9" class="no-data">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div class="modal-overlay" id="addModal">
    <div class="modal" style="max-width:520px">
      <div class="modal-header"><h2>Book Appointment</h2><button class="modal-close" onclick="closeModal('addModal')">✕</button></div>
      <div class="alert alert-error" id="addAlert"></div>
      <div class="form-row">
        <div class="form-group"><label>Client Name *</label><input type="text" id="aClientName" placeholder="Full name"/></div>
        <div class="form-group"><label>Phone</label><input type="text" id="aClientPhone" placeholder="09XXXXXXXXX"/></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="aClientEmail" placeholder="client@email.com"/></div>
      <div class="form-group"><label>Service *</label>
        <select id="aService"><option value="">— Select Service —</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Preferred Date *</label><input type="date" id="aDate"/></div>
        <div class="form-group"><label>Preferred Time *</label><input type="time" id="aTime"/></div>
      </div>
      <div class="form-group"><label>Note</label><input type="text" id="aNote" placeholder="Optional note"/></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" id="addBtn" onclick="bookAppointment()">
          <span class="spinner" id="addSpin"></span><span id="addBtnTxt">Book Now</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/common.js"></script>
  <script src="../js/pages/appointments.js"></script>
</body>
</html>
