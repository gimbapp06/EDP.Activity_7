<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>THBMS — Payments</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/transactions.css"/>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-brand">Tranquility<span>Haven</span></div>
    <div class="topbar-nav">
      <a href="../index.html">Dashboard</a>
      <a href="appointments.html">Appointments</a>
      <a href="assignments.html">Assignments</a>
      <a href="payments.html" class="active">Payments</a>
      <a href="reports.html">Reports</a>
    </div>
    <div class="topbar-user"><span>Welcome, <strong id="topbarName">—</strong></span>
      <button class="btn btn-outline btn-sm logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </nav>
  <div class="page-wrap">
    <div class="section-header">
      <div><h1>Payment Processing</h1><p class="section-desc">Transaction 3 — Process and record client payments.</p></div>
      <button class="btn btn-primary" onclick="openPayModal()">+ Process Payment</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search client, service, method…" oninput="loadData()"/>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Client</th><th>Service</th><th>Amount</th>
            <th>Method</th><th>Status</th><th>Processed At</th><th>Processed By</th><th>Actions</th>
          </tr></thead>
          <tbody id="dataTable"><tr><td colspan="9" class="no-data">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PAYMENT MODAL -->
  <div class="modal-overlay" id="payModal">
    <div class="modal">
      <div class="modal-header"><h2>Process Payment</h2><button class="modal-close" onclick="closeModal('payModal')">✕</button></div>
      <div class="alert alert-error" id="payAlert"></div>
      <div class="form-group"><label>Appointment (Unpaid) *</label>
        <select id="pAppt" onchange="fillAmount()"><option value="">— Select Appointment —</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Amount (₱) *</label><input type="number" id="pAmount" step="0.01" min="1" placeholder="0.00"/></div>
        <div class="form-group"><label>Method *</label>
          <select id="pMethod">
            <option value="cash">Cash</option>
            <option value="gcash">GCash</option>
            <option value="credit_card">Credit Card</option>
            <option value="paymaya">PayMaya</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Remarks</label><input type="text" id="pRemarks" placeholder="Optional remarks"/></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('payModal')">Cancel</button>
        <button class="btn btn-primary" id="payBtn" onclick="doPayment()">
          <span class="spinner" id="paySpin"></span><span id="payBtnTxt">Process Payment</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/common.js"></script>
  <script src="../js/pages/payments.js"></script>
</body>
</html>
